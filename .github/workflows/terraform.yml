name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/terraform/**'

env:
  TF_VERSION: '1.12.2'
  WORKING_DIR: './infra/terraform'

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_object_id: ${{ secrets.AZURE_OBJECT_ID }}
          TF_VAR_project: ${{ secrets.TF_PROJECT }}
          TF_VAR_environment: ${{ secrets.TF_ENVIRONMENT }}
          TF_VAR_location: ${{ secrets.TF_LOCATION }}
          TF_VAR_resource_group_name: ${{ secrets.TF_RESOURCE_GROUP_NAME }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_object_id: ${{ secrets.AZURE_OBJECT_ID }}
          TF_VAR_project: ${{ secrets.TF_PROJECT }}
          TF_VAR_environment: ${{ secrets.TF_ENVIRONMENT }}
          TF_VAR_location: ${{ secrets.TF_LOCATION }}
          TF_VAR_resource_group_name: ${{ secrets.TF_RESOURCE_GROUP_NAME }}